<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiktor Schab(57836) - PTW LAB C</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>

<div class="container">
    <h1>Interaktywna Mapa i Puzzle</h1>

    <div id="map-section">
        <div id="map"></div>
        <div class="controls">
            <button id="btn-location">Moja lokalizacja</button>
            <button id="btn-download">Pobierz mapę i stwórz puzzle</button>
            <p id="coords">Współrzędne: - </p>
        </div>
    </div>

    <hr>

    <div id="puzzle-section">
        <h2>Stół do układania</h2>

        <div id="puzzle-board"></div>

        <div id="puzzle-container">
            <canvas id="puzzle-canvas" width="400" height="400"></canvas>
            <div id="puzzle-slots"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
</body>
</html>
