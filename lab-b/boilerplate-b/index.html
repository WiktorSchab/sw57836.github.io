<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiktor Schab (57836) - PTW LAB B</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>

<div class="Todo">
    <h1>Lista todo</h1>
    <div class="Searchbar">
        <input type="text" id="searchInput" placeholder="Szukaj..."/>
        <div class="IconWrapper SearchbarIcon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
            </svg>
        </div>
    </div>

    <ul class="TaskList" id="taskList">
    </ul>

    <form class="Form" id="taskForm">
        <h2>Nowe zadanie</h2>
        <div>
            <input type="text" id="taskTitle" placeholder="Tytuł (3-255 znaków)" required/>
            <input id="taskDate" type="datetime-local"/>
            <button type="submit">Zapisz</button>
        </div>
    </form>
</div>

</body>
</html>
